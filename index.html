<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CriptoPan - Web3 Seka</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/index.umd.min.js"></script>

    <style>
        :root { --gold: #ffcc00; --bg: #121212; --panel: #1e1e1e; --green: #006400; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        .header { width: 100%; background: var(--panel); padding: 15px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-around; font-size: 14px; }
        .gold-text { color: var(--gold); font-weight: bold; display: block; font-size: 18px; }

        .game-table { width: 90%; max-width: 600px; height: 350px; background: var(--green); border: 8px solid #3d2b1f; border-radius: 150px; margin: 20px; position: relative; box-shadow: inset 0 0 50px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; }
        .table-label { color: rgba(255,255,255,0.2); font-size: 24px; font-weight: bold; text-transform: uppercase; }

        .ui-panel { background: var(--panel); padding: 20px; border-radius: 10px; width: 90%; max-width: 600px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        
        button { background: var(--gold); color: black; border: none; padding: 12px 20px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        button:hover { transform: scale(1.05); background: #f0c000; }
        button:disabled { background: #444; color: #888; }

        #log { width: 90%; max-width: 600px; height: 120px; background: black; margin: 15px; padding: 10px; border: 1px solid #333; overflow-y: auto; font-family: monospace; color: #0f0; font-size: 12px; }
    </style>
</head>
<body>

<div class="header">
    <div>ПРОЕКТ<span class="gold-text">CriptoPan</span></div>
    <div>ID ИГРОКА<span id="player-id" class="gold-text">---</span></div>
    <div>БАЛАНС (ОЧКИ)<span id="balance-val" class="gold-text">0</span></div>
    <div>КОШЕЛЕК<span id="wallet-addr" class="gold-text">Нет связи</span></div>
</div>

<div class="game-table">
    <div class="table-label">CriptoPan Table</div>
</div>

<div class="ui-panel">
    <button id="btn-connect" onclick="connect()">Подключить Кошелек</button>
    <button id="btn-deposit" onclick="deposit()" style="display:none;">Внести Крипту</button>
    <button id="btn-withdraw" onclick="withdraw()" style="display:none;">Вывести Очки</button>
</div>

<div id="log">>> Ожидание подключения MetaMask...</div>

<script>
    // --- НАСТРОЙКИ (ЗАМЕНИ АДРЕС ПОСЛЕ ДЕПЛОЯ) ---
    const CONTRACT_ADDRESS = "0x0000000000000000000000000000000000000000"; 
    const ABI = [
        "function deposit() external payable",
        "function withdraw(uint256 _points) external",
        "function balances(address) view returns (uint256)"
    ];

    let provider, signer, contract;

    function addLog(msg) {
        const log = document.getElementById('log');
        log.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    async function connect() {
        if (typeof window.ethers === "undefined") {
            addLog("❌ Ошибка: Библиотека ethers не загружена. Проверьте интернет.");
            return;
        }

        if (!window.ethereum) {
            alert("Установите MetaMask!");
            return;
        }

        try {
            provider = new ethers.BrowserProvider(window.ethereum);
            const accounts = await provider.send("eth_requestAccounts", []);
            signer = await provider.getSigner();
            
            contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

            const addr = accounts[0];
            document.getElementById('wallet-addr').innerText = addr.slice(0,6) + "..." + addr.slice(-4);
            document.getElementById('player-id').innerText = Math.floor(1000 + Math.random() * 9000);
            
            document.getElementById('btn-connect').style.display = 'none';
            document.getElementById('btn-deposit').style.display = 'inline-block';
            document.getElementById('btn-withdraw').style.display = 'inline-block';

            addLog("✅ Кошелек подключен успешно!");
            updateBalance(addr);

        } catch (e) {
            addLog("❌ Ошибка подключения: " + e.message);
        }
    }

    async function updateBalance(address) {
        try {
            const points = await contract.balances(address);
            document.getElementById('balance-val').innerText = points.toString();
        } catch (e) {
            console.error(e);
        }
    }

    async function deposit() {
        const amount = prompt("Сколько единиц крипты внести?", "0.1");
        if (!amount) return;

        try {
            addLog("⏳ Ожидание подтверждения в MetaMask...");
            const tx = await contract.deposit({ value: ethers.parseEther(amount) });
            addLog("📡 Транзакция отправлена. Ждем сеть...");
            await tx.wait();
            addLog("✅ Депозит зачислен!");
            updateBalance(await signer.getAddress());
        } catch (e) {
            addLog("❌ Ошибка: " + (e.reason || e.message));
        }
    }

    async function withdraw() {
        const points = prompt("Сколько очков вывести?");
        if (!points) return;

        try {
            addLog("⏳ Запрос на вывод средств...");
            const tx = await contract.withdraw(points);
            await tx.wait();
            addLog("✅ Средства выведены на ваш кошелек!");
            updateBalance(await signer.getAddress());
        } catch (e) {
            addLog("❌ Ошибка: " + (e.reason || e.message));
        }
    }
</script>

</body>
</html>
