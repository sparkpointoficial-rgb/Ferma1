<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Seka: Тёмная и Удобный Интерфейс</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #0a2e1a; color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .table { 
            position: relative; width: 800px; height: 500px; 
            background: radial-gradient(#1a5e35, #051a0d); 
            border: 12px solid #3e2723; border-radius: 180px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }

        .player { position: absolute; width: 150px; text-align: center; transition: 0.3s; padding: 10px; }
        .p0 { bottom: 30px; left: 325px; z-index: 10; } /* ВЫ */
        .p1 { left: 20px; top: 200px; }
        .p2 { top: 20px; left: 325px; }
        .p3 { right: 20px; top: 200px; }

        .active-turn { background: rgba(255, 255, 255, 0.1); border-radius: 15px; box-shadow: 0 0 20px #f1c40f; }
        .folded { opacity: 0.3; filter: grayscale(1); }

        .card { 
            display: inline-block; width: 40px; height: 60px; 
            background: white; color: black; border-radius: 5px; 
            margin: 2px; line-height: 60px; font-weight: bold; 
            font-size: 15px; border: 1px solid #000; box-shadow: 2px 2px 5px #000;
        }
        .card.hidden { background: linear-gradient(45deg, #1c2a38, #000); border: 1px solid #aaa; color: transparent; }

        .pot-box { position: absolute; top: 40%; left: 35%; width: 30%; text-align: center; }
        #pot-val { font-size: 34px; color: #f1c40f; text-shadow: 2px 2px 4px #000; }

        /* ПАНЕЛЬ УПРАВЛЕНИЯ ПРЯМО ТУТ */
        .player-ui { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; align-items: center; }
        .btn-row { display: flex; gap: 5px; }

        button { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; font-size: 12px; text-transform: uppercase; }
        .btn-main { background: #f1c40f; color: #000; }
        .btn-bet { background: #2ecc71; color: #fff; }
        .btn-fold { background: #e74c3c; color: #fff; }
        .btn-see { background: #3498db; color: #fff; }
        button:disabled { background: #444 !important; opacity: 0.5; cursor: not-allowed; }

        .chips-label { color: #f1c40f; font-weight: bold; font-size: 18px; margin-bottom: 5px; display: block; }
        #log { position: fixed; left: 10px; bottom: 10px; width: 250px; height: 100px; background: rgba(0,0,0,0.7); color: #ccc; font-size: 11px; padding: 5px; overflow-y: auto; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="table">
    <div class="pot-box">
        <div id="pot-val">💰 0</div>
        <div style="font-size:12px">Конун: <span id="cur-bet">10</span></div>
    </div>

    <div id="player-1" class="player p1">Бот 1<div class="cards"></div><span id="chips-1" class="chips-label">1000</span></div>
    <div id="player-2" class="player p2">Бот 2<div class="cards"></div><span id="chips-2" class="chips-label">1000</span></div>
    <div id="player-3" class="player p3">Бот 3<div class="cards"></div><span id="chips-3" class="chips-label">1000</span></div>

    <div id="player-0" class="player p0">
        <span id="chips-0" class="chips-label">1000</span>
        <div class="cards"></div>
        <div id="score-label" style="font-size:12px; margin: 5px 0;"></div>
        
        <div class="player-ui">
            <button id="start-btn" class="btn-main" onclick="startNewRound()">Раздать</button>
            
            <div id="actions" style="display:none; flex-direction: column; gap: 5px;">
                <div class="btn-row">
                    <button class="btn-see" id="see-btn" onclick="action('see')">Глаза</button>
                    <button class="btn-bet" id="bet-btn" onclick="action('bet')">Ставка</button>
                </div>
                <div class="btn-row">
                    <button class="btn-fold" onclick="action('fold')">Пас</button>
                    <button class="btn-main" style="background:#9b59b6; color:white;" onclick="action('showdown')">Вскрыть</button>
                </div>
                <input type="range" id="raise-slider" min="10" max="100" step="10" style="width: 100px;">
                <span style="font-size:10px">Raise: <b id="raise-txt">10</b></span>
            </div>
        </div>
    </div>
</div>

<div id="log"></div>

<script>
    let players = [{id:0, chips:1000, hand:[], isFolded:false, isBlind:true, show:false}, {id:1, chips:1000, hand:[], isFolded:false, isBlind:true}, {id:2, chips:1000, hand:[], isFolded:false, isBlind:true}, {id:3, chips:1000, hand:[], isFolded:false, isBlind:true}];
    let pot = 0, currentBet = 10, activeIdx = 0, lastIsBlind = true;

    document.getElementById('raise-slider').oninput = function() { document.getElementById('raise-txt').innerText = this.value; };

    function log(m) { const l = document.getElementById('log'); l.innerHTML = `> ${m}<br>${l.innerHTML}`; }

    function getPoints(hand) {
        let hasJ = hand.some(c => c.v === 'JK'), pure = hand.filter(c => c.v !== 'JK'), aces = pure.filter(c => c.v === 'A').length;
        if (aces === 3 || (aces === 2 && hasJ)) return 33;
        if (aces === 2 || (aces === 1 && hasJ)) return 22;
        let suits = {'♥':0,'♦':0,'♣':0,'♠':0,'★':0};
        pure.forEach(c => suits[c.s] += c.p);
        let maxS = Math.max(...Object.values(suits)) + (hasJ ? 11 : 0);
        let counts = {}; pure.forEach(c => counts[c.v] = (counts[c.v] || 0) + 1);
        let setP = 0; for (let v in counts) if (counts[v] === 3 || (counts[v] === 2 && hasJ)) setP = 30;
        return Math.max(maxS, setP);
    }

    function startNewRound() {
        let deck = []; const s = ['♥','♦','♣','♠'], v = ['10','J','Q','K','A'];
        s.forEach(suit => v.forEach(val => deck.push({v, s:suit, p:v==='A'?11:10})));
        deck.push({v:'JK', s:'★', p:11}); deck.sort(() => Math.random() - 0.5);

        players.forEach(p => {
            p.hand = [deck.pop(), deck.pop(), deck.pop()];
            p.isFolded = false; p.isBlind = true; p.show = false;
            p.chips -= 10; pot += 10;
        });

        currentBet = 10; activeIdx = 0; lastIsBlind = true;
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('actions').style.display = 'flex';
        log("Новая раздача. Вы в тёмную.");
        updateUI();
    }

    function action(type) {
        if (activeIdx !== 0) return;
        if (type === 'see') { 
            players[0].isBlind = false; 
            log("Вы посмотрели карты!"); 
        } else if (type === 'bet') {
            let raise = parseInt(document.getElementById('raise-slider').value);
            currentBet = raise;
            let cost = players[0].isBlind ? currentBet : currentBet * 2;
            players[0].chips -= cost; pot += cost;
            lastIsBlind = players[0].isBlind;
            log(`Ставка: ${cost}`);
            nextTurn();
        } else if (type === 'fold') { players[0].isFolded = true; finish(); }
        else if (type === 'showdown') { finish(); }
        updateUI();
    }

    function nextTurn() {
        activeIdx = (activeIdx + 1) % 4;
        if (players[activeIdx].isFolded) { nextTurn(); return; }
        updateUI();
        if (activeIdx !== 0) setTimeout(botTurn, 1000);
    }

    function botTurn() {
        let b = players[activeIdx];
        if (Math.random() > 0.15) {
            let cost = lastIsBlind ? currentBet : currentBet; // Боты темнят
            b.chips -= cost; pot += cost;
            log(`Бот ${activeIdx} поставил ${cost}`);
        } else { b.isFolded = true; log(`Бот ${activeIdx} ПАС`); }
        nextTurn();
    }

    function updateUI() {
        document.getElementById('pot-val').innerText = "💰 " + pot;
        document.getElementById('cur-bet').innerText = currentBet;
        players.forEach((p, i) => {
            document.getElementById(`chips-${i}`).innerText = p.chips;
            const el = document.getElementById(`player-${i}`);
            el.className = `player p${i} ${i === activeIdx ? 'active-turn' : ''} ${p.isFolded ? 'folded' : ''}`;
            const cont = el.querySelector('.cards'); cont.innerHTML = '';
            p.hand.forEach(c => {
                const d = document.createElement('div');
                d.className = (i === 0 && !p.isBlind) || p.show ? 'card' : 'card hidden';
                if (!d.classList.contains('hidden')) { d.innerText = c.v + c.s; if (c.s === '♥' || c.s === '♦') d.style.color = 'red'; }
                cont.appendChild(d);
            });
        });
        document.getElementById('see-btn').disabled = !players[0].isBlind;
        document.getElementById('bet-btn').innerText = players[0].isBlind ? "Тёмная" : "Светлая";
        document.getElementById('score-label').innerText = players[0].isBlind ? "???" : getPoints(players[0].hand) + " очков";
    }

    function finish() {
        let win = [], max = -1;
        players.forEach((p, i) => {
            p.show = true; if (!p.isFolded) {
                let pts = getPoints(p.hand);
                if (pts > max) { max = pts; win = [i]; } else if (pts === max) win.push(i);
            }
        });
        updateUI();
        if (win.length > 1) log("СВАРА!");
        else { players[win[0]].chips += pot; log(`Выиграл ${win[0]==0?'ВЫ':'Бот '+win[0]} (${max} очк.)`); pot = 0; }
        document.getElementById('start-btn').style.display = 'block';
        document.getElementById('actions').style.display = 'none';
    }
</script>
</body>
</html>
