<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Seka: Тёмная и Перетемная (Fixed)</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #0a2e1a; color: white; text-align: center; margin: 0; }
        .table { 
            position: relative; width: 700px; height: 450px; 
            background: radial-gradient(#1a5e35, #071a0d); 
            border: 10px solid #3e2723; border-radius: 150px; 
            margin: 20px auto; box-shadow: 0 0 40px #000;
        }
        .player { position: absolute; width: 120px; padding: 10px; border-radius: 10px; background: rgba(0,0,0,0.4); border: 2px solid transparent; }
        .p0 { bottom: 15px; left: 290px; border-color: #f1c40f; } 
        .p1 { left: 15px; top: 180px; }
        .p2 { top: 15px; left: 290px; }
        .p3 { right: 15px; top: 180px; }
        
        .active-turn { border-color: #2ecc71; box-shadow: 0 0 15px #2ecc71; transform: scale(1.05); transition: 0.3s; }
        .folded { opacity: 0.5; filter: grayscale(1); }

        .card { display: inline-block; width: 35px; height: 50px; background: white; color: black; border-radius: 4px; margin: 2px; line-height: 50px; font-size: 12px; font-weight: bold; border: 1px solid #000; }
        .card.hidden { background: #2c3e50; color: #2c3e50; border: 1px solid #eee; }
        
        .pot-area { position: absolute; top: 40%; left: 30%; width: 40%; font-size: 20px; color: #f1c40f; font-weight: bold; }
        .controls { margin-top: 20px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        
        button { padding: 12px 18px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; font-size: 14px; transition: 0.2s; }
        button:disabled { background: #444 !important; cursor: not-allowed; opacity: 0.5; }
        .btn-blind { background: #8e44ad; color: white; }
        .btn-light { background: #2ecc71; color: white; }
        .btn-fold { background: #e74c3c; color: white; }
        .btn-start { background: #f1c40f; padding: 15px 30px; font-size: 18px; }

        #log { width: 700px; height: 120px; background: rgba(0,0,0,0.8); margin: 10px auto; overflow-y: auto; padding: 10px; text-align: left; font-family: monospace; border: 1px solid #333; }
    </style>
</head>
<body>

<h1>SEKA ONLINE</h1>
<div id="dealer-info">Банк формируется...</div>

<div class="table">
    <div class="pot-area">БАНК: <span id="pot-val">0</span><br><small>Ставка: <span id="current-bet">10</span></small></div>
    
    <div id="player-0" class="player p0"><b>ВЫ</b><div class="cards"></div><div id="my-pts" style="color:#f1c40f"></div></div>
    <div id="player-1" class="player p1">Бот 1<div class="cards"></div></div>
    <div id="player-2" class="player p2">Бот 2<div class="cards"></div></div>
    <div id="player-3" class="player p3">Бот 3<div class="cards"></div></div>
</div>

<div class="controls">
    <button id="start-btn" class="btn-start" onclick="newGame()">НОВАЯ ИГРА</button>
    
    <div id="actions" style="display:none; gap: 10px;">
        <button id="btn-blind" class="btn-blind" onclick="handleAction('blind')">Тёмная</button>
        <button id="btn-see" class="btn-light" onclick="seeCards()">Посмотреть</button>
        <button id="btn-bet" class="btn-light" onclick="handleAction('bet')">Ставка</button>
        <button id="btn-fold" class="btn-fold" onclick="handleAction('fold')">Пас</button>
        <button id="btn-show" class="btn-light" style="background:#3498db" onclick="handleAction('showdown')">Вскрыться</button>
    </div>
</div>

<div id="log"></div>

<script>
    let players = [];
    let pot = 0;
    let currentBet = 10;
    let activeIdx = 0;
    let lastBetterWasBlind = true;
    let gameActive = false;

    const addLog = (m) => { const l = document.getElementById('log'); l.innerHTML = `> ${m}<br>${l.innerHTML}`; };

    function createDeck() {
        const suits = ['♥','♦','♣','♠'], vals = ['10','J','Q','K','A'];
        let d = [];
        suits.forEach(s => vals.forEach(v => d.push({v, s, p: v==='A'?11:10})));
        d.push({v:'JK', s:'★', p:11});
        return d.sort(() => Math.random() - 0.5);
    }

    function calc(hand) {
        let hasJ = hand.some(c => c.v === 'JK'), pure = hand.filter(c => c.v !== 'JK');
        let sP = {'♥':0,'♦':0,'♣':0,'♠':0,'★':0};
        pure.forEach(c => sP[c.s] += c.p);
        let maxS = Math.max(...Object.values(sP)) + (hasJ ? 11 : 0);
        let counts = {}; pure.forEach(c => counts[c.v] = (counts[c.v] || 0) + 1);
        let setP = 0;
        for (let v in counts) if (counts[v] === 3 || (counts[v] === 2 && hasJ)) setP = (v === 'A' ? 31 : 30);
        return Math.max(maxS, setP);
    }

    function newGame() {
        let deck = createDeck();
        players = [];
        for(let i=0; i<4; i++) {
            players.push({ 
                id: i, 
                cards: [deck.pop(), deck.pop(), deck.pop()], 
                isFolded: false, 
                isBlind: true,
                show: false 
            });
        }
        
        pot = 40; // Начальный банк (по 10 с каждого)
        currentBet = 10;
        activeIdx = 0; 
        lastBetterWasBlind = true;
        gameActive = true;

        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('actions').style.display = 'flex';
        addLog("Раздача! Банк: 40. Ваш ход (Тёмная или Посмотреть).");
        updateUI();
    }

    function seeCards() {
        players[0].isBlind = false;
        addLog("Вы посмотрели карты! Ваши ставки теперь в 2 раза выше.");
        updateUI();
    }

    function handleAction(type) {
        if (!gameActive || activeIdx !== 0) return;

        if (type === 'blind') {
            pot += currentBet;
            addLog(`Вы поставили Тёмную ${currentBet}`);
        } else if (type === 'bet') {
            let val = lastBetterWasBlind && !players[0].isBlind ? currentBet * 2 : currentBet;
            pot += val;
            currentBet = val;
            lastBetterWasBlind = false;
            addLog(`Вы поставили ${val}`);
        } else if (type === 'fold') {
            players[0].isFolded = true;
            addLog("Вы спасовали.");
            finishGame(); return;
        } else if (type === 'showdown') {
            finishGame(); return;
        }

        nextTurn();
    }

    function nextTurn() {
        activeIdx = (activeIdx + 1) % 4;
        updateUI();

        if (activeIdx !== 0 && !players[activeIdx].isFolded) {
            setTimeout(botTurn, 1000);
        } else if (players[activeIdx].isFolded) {
            nextTurn();
        }
    }

    function botTurn() {
        if (!gameActive) return;
        
        // Логика бота: если игрок поставил много, бот может спасовать
        if (Math.random() > 0.15) {
            let bVal = lastBetterWasBlind && !players[activeIdx].isBlind ? currentBet * 2 : currentBet;
            pot += bVal;
            addLog(`Бот ${activeIdx} поставил ${bVal}`);
        } else {
            players[activeIdx].isFolded = true;
            addLog(`Бот ${activeIdx} ПАС`);
        }
        nextTurn();
    }

    function updateUI() {
        document.getElementById('pot-val').innerText = pot;
        document.getElementById('current-bet').innerText = currentBet;

        for(let i=0; i<4; i++) {
            const p = players[i];
            const el = document.getElementById(`player-${i}`);
            el.className = `player p${i} ${i === activeIdx ? 'active-turn' : ''} ${p.isFolded ? 'folded' : ''}`;
            
            const cardCont = el.querySelector('.cards');
            cardCont.innerHTML = '';
            p.cards.forEach(c => {
                const div = document.createElement('div');
                // Показываем если: игрок посмотрел ИЛИ игра окончена
                div.className = (i === 0 && !p.isBlind) || p.show ? 'card' : 'card hidden';
                if (!div.classList.contains('hidden')) {
                    div.innerText = c.v + c.s;
                    if (c.s === '♥' || c.s === '♦') div.style.color = 'red';
                }
                cardCont.appendChild(div);
            });
        }

        // Кнопки игрока
        const isMyTurn = (activeIdx === 0);
        document.getElementById('btn-blind').disabled = !isMyTurn || !players[0].isBlind;
        document.getElementById('btn-see').disabled = !isMyTurn || !players[0].isBlind;
        document.getElementById('btn-bet').disabled = !isMyTurn;
        document.getElementById('btn-fold').disabled = !isMyTurn;
        document.getElementById('btn-show').disabled = !isMyTurn;

        // Надпись на кнопке ставки
        let betVal = lastBetterWasBlind && !players[0].isBlind ? currentBet * 2 : currentBet;
        document.getElementById('btn-bet').innerText = `Ставка (${betVal})`;

        if (!players[0].isBlind) {
            document.getElementById('my-pts').innerText = "Очки: " + calc(players[0].cards);
        } else {
            document.getElementById('my-pts').innerText = "";
        }
    }

    function finishGame() {
        gameActive = false;
        let winners = [];
        let maxPts = -1;

        players.forEach((p, idx) => {
            p.show = true; // Открываем карты всех в конце
            if (!p.isFolded) {
                let pts = calc(p.cards);
                if (pts > maxPts) { maxPts = pts; winners = [idx]; }
                else if (pts === maxPts) { winners.push(idx); }
            }
        });

        updateUI();
        if (winners.length > 1) {
            addLog(`<b style="color:orange">СВАРА! Банк ${pot} остается.</b>`);
        } else {
            addLog(`<b style="color:yellow">Победа: ${winners[0] === 0 ? "ВЫ" : "Бот " + winners[0]} (${maxPts} очк.)</b>`);
        }
        document.getElementById('start-btn').style.display = 'inline-block';
        document.getElementById('actions').style.display = 'none';
    }
</script>
</body>
</html>
