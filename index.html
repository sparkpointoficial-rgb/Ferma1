<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Seka BNB</title>
<script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>

<style>
body { background:#0a0a0a; color:white; font-family:Arial; text-align:center; }
button { padding:10px; margin:5px; cursor:pointer; }
</style>
</head>

<body>

<h2>SEKA BNB</h2>

<button onclick="connectWallet()">🔗 Подключить кошелек</button>
<p id="wallet">Не подключен</p>

<hr>

<p>Баланс: <span id="chips">1000</span> очков</p>
<p>Банк: <span id="pot">0</span></p>
<p>Ставка: <span id="bet">1</span></p>

<button onclick="payKon()">Внести кон (0.0001 BNB)</button>

<hr>

<button onclick="action('dark')">Тёмный</button>
<button onclick="action('call')">Поддержать</button>
<button onclick="action('raise')">Перетёмный</button>
<button onclick="action('fold')">Пас</button>

<hr>

<button onclick="deposit()">Депозит 0.01 BNB</button>
<button onclick="withdraw()">Вывод</button>
<button onclick="bonus()">Бонус</button>

<script>

// ─── НАСТРОЙКИ ───
const RATE = 100;
const KON_BNB = 0.0001;
const KON = KON_BNB * RATE;

const CONTRACT_ADDRESS = "PASTE_CONTRACT";
const ABI = [
 { "inputs":[], "name":"deposit", "stateMutability":"payable", "type":"function" },
 { "inputs":[{"name":"amount","type":"uint256"}], "name":"withdraw", "stateMutability":"nonpayable", "type":"function" }
];

// ─── СОСТОЯНИЕ ───
let wallet = null;
let web3;
let contract;

let players = [
 {chips:1000, folded:false},
 {chips:1000, folded:false},
 {chips:1000, folded:false},
 {chips:1000, folded:false}
];

let pot = 0;
let bet = 1;
let dealer = 0;
let turn = 0;

// ─── КОШЕЛЕК ───
async function connectWallet() {
 if (!window.ethereum) return alert("Нет MetaMask");

 web3 = new Web3(window.ethereum);
 await ethereum.request({method:'eth_requestAccounts'});

 const accounts = await web3.eth.getAccounts();
 wallet = accounts[0];

 document.getElementById('wallet').innerText =
  wallet.slice(0,6)+"..."+wallet.slice(-4);

 // BSC
 try {
  await ethereum.request({
   method:'wallet_switchEthereumChain',
   params:[{chainId:'0x38'}]
  });
 } catch(e) {}

 contract = new web3.eth.Contract(ABI, CONTRACT_ADDRESS);
}

// ─── ДЕПОЗИТ ───
async function deposit() {
 const value = web3.utils.toWei("0.01","ether");

 await contract.methods.deposit().send({
  from: wallet,
  value
 });

 players[0].chips += 0.01 * RATE;
 update();
}

// ─── ВЫВОД ───
async function withdraw() {
 let pts = 100;
 let bnb = pts / RATE;

 const wei = web3.utils.toWei(bnb.toString(),"ether");

 await contract.methods.withdraw(wei).send({
  from: wallet
 });

 players[0].chips -= pts;
 update();
}

// ─── БОНУС ───
function bonus(){
 players[0].chips += 500;
 update();
}

// ─── КОН ───
function payKon(){
 if(players[0].chips < KON) return alert("Мало очков");

 players[0].chips -= KON;
 pot += KON;

 startGame();
 update();
}

// ─── ИГРА ───
function startGame(){
 turn = (dealer + 1) % 4;
}

// ─── ДЕЙСТВИЯ ───
function action(type){

 if(type === "dark"){
  players[0].chips -= bet;
  pot += bet;
 }

 if(type === "call"){
  players[0].chips -= bet*2;
  pot += bet*2;
 }

 if(type === "raise"){
  bet = bet + bet*2;
  players[0].chips -= bet;
  pot += bet;
 }

 if(type === "fold"){
  finish();
  return;
 }

 next();
 update();
}

// ─── ХОД ───
function next(){
 turn = (turn + 1) % 4;

 if(turn !== 0){
  setTimeout(bot, 500);
 }
}

// ─── БОТ ───
function bot(){
 if(Math.random() > 0.5){
  pot += bet;
 } else {
  players[turn].folded = true;
 }
 next();
}

// ─── ФИНИШ ───
function finish(){

 let winner = Math.floor(Math.random()*4);

 players[winner].chips += pot;

 dealer = winner;
 pot = 0;

 update();
}

// ─── UI ───
function update(){
 document.getElementById('chips').innerText = players[0].chips;
 document.getElementById('pot').innerText = pot;
 document.getElementById('bet').innerText = bet;
}

</script>

</body>
</html>
