<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seka Club: ID Balance System</title>
    <style>
        :root { --gold: #f1c40f; --green: #2ecc71; --dark-bg: #0d0d0d; --table-green: radial-gradient(#1a5e35, #051a0d); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; }

        /* HEADER */
        .header { width: 100%; background: #1a1a1a; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); box-sizing: border-box; }
        .balance-display { background: #000; padding: 5px 15px; border-radius: 20px; border: 1px solid var(--gold); color: var(--gold); font-weight: bold; font-size: 18px; }
        .id-badge { color: #888; font-size: 12px; margin-left: 10px; }

        /* TABLE */
        .table { 
            position: relative; width: 95vw; max-width: 800px; height: 420px; 
            background: var(--table-green); border: 12px solid #3e2723; border-radius: 160px; 
            margin: 20px auto; box-shadow: 0 0 60px rgba(0,0,0,0.8);
        }

        .pot-center { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        .pot-center h2 { font-size: 36px; color: var(--gold); margin: 0; filter: drop-shadow(2px 2px 2px #000); }

        .player { position: absolute; width: 130px; text-align: center; transition: 0.3s; }
        .p0 { bottom: 15px; left: 50%; transform: translateX(-50%); } /* ИГРОК */
        .p1 { left: 15px; top: 50%; transform: translateY(-50%); }
        .p2 { top: 15px; left: 50%; transform: translateX(-50%); }
        .p3 { right: 15px; top: 50%; transform: translateY(-50%); }

        /* CARDS - FIXED JOKER BACK */
        .card-row { display: flex; justify-content: center; gap: 5px; height: 65px; margin-bottom: 5px; }
        .card { 
            width: 42px; height: 60px; background: white; color: #000; border-radius: 5px; 
            font-weight: bold; font-size: 16px; display: flex; align-items: center; justify-content: center;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5); border: 1px solid #ccc;
        }
        /* Рубашка (строго одинаковая для всех, включая джокера) */
        .card.hidden { 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%) !important; 
            color: transparent !important; 
            border: 2px solid #fff !important; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .card.joker { background: var(--gold); border: 1px solid #fff; }

        .bot-score { font-size: 11px; background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 4px; color: var(--gold); display: none; }

        /* CONTROLS */
        .controls { width: 100%; max-width: 600px; padding: 20px; background: #1a1a1a; border-radius: 20px 20px 0 0; }
        .btn-main { background: var(--gold); color: #000; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; margin-bottom: 10px; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn-act { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; background: #333; }
        
        .slider-cont { margin: 15px 0; display: flex; flex-direction: column; align-items: center; color: var(--gold); }
        input[type=range] { width: 80%; accent-color: var(--gold); }

        /* CABINET MODAL */
        #cabinet { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; padding: 25px; border-radius: 15px; border: 2px solid var(--gold); z-index: 1000; width: 320px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; }
        .input-box { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="header">
    <div style="display:flex; align-items:center;">
        <div class="balance-display">💰 <span id="main-balance">1000</span></div>
        <div class="id-badge" id="display-id">ID: #0000</div>
    </div>
    <button class="btn-act" style="background:var(--gold); color:#000;" onclick="toggleCabinet(true)">КАБИНЕТ</button>
</div>

<div class="table">
    <div class="pot-center">
        <h2 id="total-pot">💰 0</h2>
        <small>Конун: <span id="current-stake">10</span></small>
    </div>

    <div id="player-1" class="player p1"><div class="bot-score"></div><div class="card-row"></div><small>Бот 1</small></div>
    <div id="player-2" class="player p2"><div class="bot-score"></div><div class="card-row"></div><small>Бот 2</small></div>
    <div id="player-3" class="player p3"><div class="bot-score"></div><div class="card-row"></div><small>Бот 3</small></div>

    <div id="player-0" class="player p0">
        <div id="my-pts" style="color:var(--gold); font-weight:bold; font-size:14px; margin-bottom:5px;"></div>
        <div class="card-row" id="my-cards"></div>
        <div style="font-weight:bold;">ВЫ (ID <span id="short-id">000</span>)</div>
    </div>
</div>

<div class="controls">
    <button id="deal-btn" class="btn-main" onclick="startRound()">НОВАЯ РАЗДАЧА (10)</button>
    
    <div id="play-ui" style="display:none;">
        <div class="slider-cont">
            <span>Поднять на: <b id="raise-val">20</b></span>
            <input type="range" id="raise-slider" min="10" max="200" step="10" value="20" oninput="document.getElementById('raise-val').innerText=this.value">
        </div>
        <div class="action-grid">
            <button class="btn-act" id="see-btn" style="background:#3498db" onclick="handle('see')">ГЛАЗА</button>
            <button class="btn-act" style="background:var(--green)" onclick="handle('call')" id="call-btn">ПОДДЕРЖАТЬ</button>
            <button class="btn-act" style="background:#9b59b6" onclick="handle('raise')">РАЙЗ</button>
            <button class="btn-act" style="background:#e74c3c" onclick="handle('fold')">ПАС</button>
            <button class="btn-act" style="background:#555; grid-column: span 2;" onclick="showdown()">ВСКРЫТЬСЯ</button>
        </div>
    </div>
</div>

<div class="overlay" onclick="toggleCabinet(false)"></div>
<div id="cabinet">
    <h3 style="color:var(--gold); margin-top:0;">Личный кабинет</h3>
    <p style="font-size:13px; color:#aaa;">Отправьте ваш ID обменнику для пополнения:</p>
    <div style="background:#000; padding:10px; border-radius:5px; text-align:center; font-weight:bold; letter-spacing:2px;" id="cab-id">#SEKA-0000</div>
    
    <div style="margin-top:20px;">
        <label style="font-size:12px;">Сумма пополнения (очки):</label>
        <input type="number" id="deposit-amt" class="input-box" value="500">
        <button class="btn-main" style="font-size:14px; padding:10px;" onclick="requestDeposit()">ЗАПРОСИТЬ ПОПОЛНЕНИЕ</button>
    </div>
    <button class="btn-act" style="width:100%; margin-top:10px;" onclick="toggleCabinet(false)">ЗАКРЫТЬ</button>
</div>

<script>
    // --- СИСТЕМА ID И БАЛАНСА ---
    let playerID = localStorage.getItem('seka_id') || "SEKA-" + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('seka_id', playerID);
    let balance = parseInt(localStorage.getItem('seka_balance')) || 1000;

    document.getElementById('display-id').innerText = "ID: #" + playerID;
    document.getElementById('cab-id').innerText = "#" + playerID;
    document.getElementById('short-id').innerText = playerID.split('-')[1];
    updateBalanceUI();

    function updateBalanceUI() {
        document.getElementById('main-balance').innerText = balance;
        localStorage.setItem('seka_balance', balance);
    }

    function toggleCabinet(s) {
        document.getElementById('cabinet').style.display = s ? 'block' : 'none';
        document.querySelector('.overlay').style.display = s ? 'block' : 'none';
    }

    function requestDeposit() {
        let amt = parseInt(document.getElementById('deposit-amt').value);
        alert("Запрос отправлен обменнику по ID " + playerID + ". Ожидайте подтверждения...");
        setTimeout(() => {
            balance += amt;
            updateBalanceUI();
            alert("Обменник подтвердил транзакцию! +" + amt + " очков зачислено.");
        }, 3000);
    }

    // --- ЛОГИКА ИГРЫ ---
    let players = [], pot = 0, curBet = 10, activeIdx = 0;

    function getPoints(hand) {
        let hasJ = hand.some(c => c.isJ), pure = hand.filter(c => !c.isJ), aces = pure.filter(c => c.v === 'A').length;
        if (aces === 3 || (aces === 2 && hasJ)) return 33;
        if (aces === 2 || (aces === 1 && hasJ)) return 22;
        let sS = {'♥':0,'♦':0,'♣':0,'♠':0,'★':0};
        pure.forEach(c => sS[c.s] += (c.v==='A'?11:10));
        return Math.max(...Object.values(sS)) + (hasJ ? 11 : 0);
    }

    function startRound() {
        if (balance < 10) return alert("Пополните баланс в кабинете!");
        let deck = [];
        ['♥','♦','♣','♠'].forEach(s => ['10','J','Q','K','A'].forEach(v => deck.push({v, s, isJ:false, c: (s=='♥'||s=='♦'?'red':'black')})));
        deck.push({v:'JK', s:'★', isJ:true, c:'black'});
        deck.sort(() => Math.random() - 0.5);

        players = [0,1,2,3].map(i => ({
            id: i, hand: [deck.pop(), deck.pop(), deck.pop()], 
            isFolded: false, isBlind: true, show: false
        }));

        balance -= 10; updateBalanceUI();
        pot = 40; curBet = 10; activeIdx = 0;
        document.getElementById('deal-btn').style.display = 'none';
        document.getElementById('play-ui').style.display = 'block';
        render();
    }

    function handle(type) {
        if (type === 'see') { players[0].isBlind = false; }
        else if (type === 'call') {
            let cost = players[0].isBlind ? curBet : curBet * 2;
            if (balance < cost) return alert("Мало очков!");
            balance -= cost; pot += cost;
            nextTurn();
        } else if (type === 'raise') {
            curBet = parseInt(document.getElementById('raise-slider').value);
            let cost = players[0].isBlind ? curBet : curBet * 2;
            balance -= cost; pot += cost;
            nextTurn();
        } else if (type === 'fold') { players[0].isFolded = true; showdown(); }
        updateBalanceUI(); render();
    }

    function nextTurn() {
        activeIdx = (activeIdx + 1) % 4;
        if (players[activeIdx].isFolded) return nextTurn();
        render();
        if (activeIdx !== 0) {
            setTimeout(() => {
                if (Math.random() > 0.2) { pot += curBet; } else { players[activeIdx].isFolded = true; }
                nextTurn();
            }, 800);
        }
    }

    function render() {
        document.getElementById('total-pot').innerText = "💰 " + pot;
        document.getElementById('current-stake').innerText = curBet;
        players.forEach((p, i) => {
            const el = document.getElementById(`player-${i}`);
            const row = el.querySelector('.card-row');
            row.innerHTML = '';
            p.hand.forEach(card => {
                const d = document.createElement('div');
                let isVisible = (i === 0 && !p.isBlind) || p.show;
                d.className = isVisible ? (card.isJ ? 'card joker' : 'card') : 'card hidden';
                if (isVisible) {
                    d.innerText = card.v + (card.isJ ? '' : card.s);
                    d.style.color = card.c;
                }
                row.appendChild(d);
            });
            // Очки ботов (показываем только в конце)
            const scoreTag = el.querySelector('.bot-score');
            if (p.show && !p.isFolded) {
                scoreTag.style.display = 'inline-block';
                scoreTag.innerText = getPoints(p.hand) + " очк.";
            } else { scoreTag.style.display = 'none'; }
        });
        document.getElementById('see-btn').disabled = !players[0].isBlind;
        document.getElementById('call-btn').innerText = `ПОДДЕРЖАТЬ (${players[0].isBlind ? curBet : curBet * 2})`;
        document.getElementById('my-pts').innerText = players[0].isBlind ? "ТЁМНАЯ" : getPoints(players[0].hand) + " ОЧКОВ";
    }

    function showdown() {
        let best = -1, winId = -1;
        players.forEach((p, i) => {
            p.show = true;
            if (!p.isFolded) {
                let pts = getPoints(p.hand);
                if (pts > best) { best = pts; winId = i; }
            }
        });
        if (winId === 0) { balance += pot; alert("ВЫ ВЫИГРАЛИ " + pot + "!"); }
        else { alert("Выиграл Бот " + winId + " (" + best + " очк.)"); }
        pot = 0; updateBalanceUI(); render();
        document.getElementById('deal-btn').style.display = 'block';
        document.getElementById('play-ui').style.display = 'none';
    }
</script>
</body>
</html>
