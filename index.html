<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CriptoPan - Полная Версия</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/index.umd.min.js"></script>
    <style>
        :root { --gold: #ffcc00; --bg: #121212; --panel: #1e1e1e; --green: #0b4d12; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Шапка */
        .header { background: var(--panel); padding: 10px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-around; font-size: 12px; text-align: center; }
        .gold { color: var(--gold); font-weight: bold; font-size: 16px; }

        /* Стол */
        .table { width: 95%; max-width: 600px; height: 350px; background: var(--green); border: 10px solid #3d2b1f; border-radius: 150px; margin: 20px auto; position: relative; box-shadow: inset 0 0 60px rgba(0,0,0,0.7); }
        .pot { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; color: var(--gold); background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; }

        /* Игроки */
        .player-slot { position: absolute; text-align: center; width: 80px; }
        .bot1 { top: 20%; left: 5%; }
        .bot2 { top: 5%; left: 40%; }
        .bot3 { top: 20%; right: 5%; }
        .user { bottom: 5%; left: 40%; }
        .cards { display: flex; justify-content: center; gap: 3px; margin-top: 5px; }
        .card { width: 25px; height: 35px; background: white; border-radius: 3px; color: black; font-size: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; border: 1px solid #999; }
        .card.hidden { background: linear-gradient(45deg, #222, #444); color: transparent; }

        /* Управление */
        .controls { background: var(--panel); padding: 15px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        button { background: var(--gold); color: black; border: none; padding: 10px 15px; font-weight: bold; border-radius: 5px; cursor: pointer; min-width: 80px; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        .action-btn { background: #28a745; color: white; }
        .fold-btn { background: #dc3545; color: white; }

        #log { height: 80px; background: black; padding: 10px; font-family: monospace; font-size: 11px; color: #0f0; overflow-y: auto; border-top: 1px solid var(--gold); }
    </style>
</head>
<body>

<div class="header">
    <div>ПРОЕКТ<br><span class="gold">CriptoPan</span></div>
    <div>БАЛАНС<br><span id="balance-val" class="gold">0</span></div>
    <div>КОШЕЛЕК<br><span id="wallet-addr" class="gold">---</span></div>
</div>

<div class="table">
    <div class="pot">Банк: <span id="pot-val">0</span></div>
    
    <div class="player-slot bot1">
        <div id="b1-name">Бот 1</div>
        <div id="b1-chips" style="font-size: 10px;">1000</div>
        <div class="cards" id="b1-cards"></div>
    </div>
    <div class="player-slot bot2">
        <div id="b2-name">Бот 2</div>
        <div id="b2-chips" style="font-size: 10px;">1000</div>
        <div class="cards" id="b2-cards"></div>
    </div>
    <div class="player-slot bot3">
        <div id="b3-name">Бот 3</div>
        <div id="b3-chips" style="font-size: 10px;">1000</div>
        <div class="cards" id="b3-cards"></div>
    </div>
    <div class="player-slot user">
        <div class="gold">ВЫ</div>
        <div id="u-chips" style="font-size: 10px;">0</div>
        <div class="cards" id="u-cards"></div>
    </div>
</div>

<div class="controls" id="game-ui" style="display:none;">
    <button class="action-btn" onclick="startNewRound()">Раздать</button>
    <button id="btn-call" onclick="playerAction('call')" disabled>Поддержать</button>
    <button id="btn-raise" onclick="playerAction('raise')" disabled>Поднять</button>
    <button class="fold-btn" id="btn-fold" onclick="playerAction('fold')" disabled>Пас</button>
</div>

<div class="controls" id="web3-ui">
    <button onclick="connect()">Подключить Кошелек</button>
    <button onclick="deposit()" style="background: #28a745; color: white;">Депозит MATIC</button>
    <button onclick="withdraw()" style="background: #007bff; color: white;">Вывод</button>
</div>

<div id="log">>> Ожидание подключения MetaMask...</div>

<script>
    // --- ДАННЫЕ БЛОКЧЕЙНА ---
    const CONTRACT_ADDRESS = "0x0000000000000000000000000000000000000000"; // Твой адрес
    const ABI = ["function deposit() payable", "function withdraw(uint256)", "function balances(address) view returns (uint256)"];
    let provider, signer, contract, userAddr;

    // --- ДВИЖОК ИГРЫ ---
    let pot = 0, currentBet = 10, userChips = 0;
    let deck = [], playerHand = [], bots = [
        { id: 1, name: "Бот 1", chips: 1000, hand: [], active: true },
        { id: 2, name: "Бот 2", chips: 1000, hand: [], active: true },
        { id: 3, name: "Бот 3", chips: 1000, hand: [], active: true }
    ];

    function addLog(m) {
        const l = document.getElementById('log');
        l.innerHTML += `<div>> ${m}</div>`;
        l.scrollTop = l.scrollHeight;
    }

    async function connect() {
        if (!window.ethereum) return alert("MetaMask!");
        provider = new ethers.BrowserProvider(window.ethereum);
        const accounts = await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();
        userAddr = accounts[0];
        contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
        
        document.getElementById('wallet-addr').innerText = userAddr.slice(0,6)+"...";
        document.getElementById('web3-ui').style.display = 'none';
        document.getElementById('game-ui').style.display = 'flex';
        addLog("Кошелек подключен. Нажмите 'Раздать'");
        updateBalance();
    }

    async function updateBalance() {
        const b = await contract.balances(userAddr);
        userChips = Number(b);
        document.getElementById('balance-val').innerText = userChips;
        document.getElementById('u-chips').innerText = userChips;
    }

    // --- ЛОГИКА СЕКИ ---
    function createDeck() {
        const suits = ['♠','♣','♥','♦'];
        const ranks = ['6','7','8','9','10','J','Q','K','A'];
        deck = [];
        suits.forEach(s => ranks.forEach(r => deck.push({r, s})));
    }

    function calculateScore(hand) {
        // Упрощенная логика Секи: сумма карт одной масти
        let max = 0;
        const suits = ['♠','♣','♥','♦'];
        suits.forEach(suit => {
            let sum = 0;
            hand.filter(c => c.s === suit).forEach(c => {
                if (['J','Q','K'].includes(c.r)) sum += 10;
                else if (c.r === 'A') sum += 11;
                else sum += parseInt(c.r);
            });
            if (sum > max) max = sum;
        });
        // Проверка на Тройку (три одинаковых ранга)
        if (hand[0].r === hand[1].r && hand[1].r === hand[2].r) return 33; 
        return max;
    }

    function startNewRound() {
        if (userChips < 10) return alert("Мало очков! Сделайте депозит.");
        createDeck();
        deck.sort(() => Math.random() - 0.5);
        
        // Сдираем входную ставку
        pot = 40; // 10 с каждого
        userChips -= 10;
        bots.forEach(b => { b.chips -= 10; b.active = true; });
        
        // Раздача
        playerHand = [deck.pop(), deck.pop(), deck.pop()];
        bots.forEach(b => b.hand = [deck.pop(), deck.pop(), deck.pop()]);

        renderCards();
        document.getElementById('pot-val').innerText = pot;
        document.getElementById('u-chips').innerText = userChips;
        
        toggleButtons(true);
        addLog("Новая раздача. У вас " + calculateScore(playerHand) + " очков.");
    }

    function renderCards() {
        const uContainer = document.getElementById('u-cards');
        uContainer.innerHTML = '';
        playerHand.forEach(c => {
            uContainer.innerHTML += `<div class="card">${c.r}${c.s}</div>`;
        });

        bots.forEach(b => {
            const bContainer = document.getElementById(`b${b.id}-cards`);
            bContainer.innerHTML = '<div class="card hidden"></div><div class="card hidden"></div><div class="card hidden"></div>';
            document.getElementById(`b${b.id}-chips`).innerText = b.chips;
        });
    }

    function toggleButtons(on) {
        document.getElementById('btn-call').disabled = !on;
        document.getElementById('btn-raise').disabled = !on;
        document.getElementById('btn-fold').disabled = !on;
    }

    function playerAction(type) {
        if (type === 'fold') {
            addLog("Вы спасовали.");
            endRound(false);
        } else if (type === 'call') {
            userChips -= 10;
            pot += 10;
            addLog("Вы поддержали ставку.");
            botsTurn();
        }
    }

    function botsTurn() {
        addLog("Боты думают...");
        setTimeout(() => {
            // Имитация: боты всегда поддерживают для простоты
            bots.forEach(b => { if(b.active) pot += 10; b.chips -= 10; });
            document.getElementById('pot-val').innerText = pot;
            showdown();
        }, 1000);
    }

    function showdown() {
        let userScore = calculateScore(playerHand);
        let winnerName = "Вы";
        let maxScore = userScore;

        bots.forEach(b => {
            const bScore = calculateScore(b.hand);
            const bContainer = document.getElementById(`b${b.id}-cards`);
            bContainer.innerHTML = '';
            b.hand.forEach(c => bContainer.innerHTML += `<div class="card">${c.r}${c.s}</div>`);
            
            if (bScore > maxScore) {
                maxScore = bScore;
                winnerName = b.name;
            }
        });

        addLog(`Вскрытие! ${winnerName} побеждает с результатом ${maxScore} очков.`);
        if (winnerName === "Вы") userChips += pot;
        
        document.getElementById('u-chips').innerText = userChips;
        document.getElementById('pot-val').innerText = 0;
        toggleButtons(false);
    }

    async function deposit() {
        const val = prompt("Сколько MATIC внести?", "1");
        if(val) {
            const tx = await contract.deposit({ value: ethers.parseEther(val) });
            await tx.wait();
            updateBalance();
        }
    }
</script>
</body>
</html>
