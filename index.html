<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Seka: Тёмная, Перетемная и Свара</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a2e1a; color: white; text-align: center; margin: 0; }
        .table { 
            position: relative; width: 800px; height: 500px; 
            background: radial-gradient(#1a5e35, #071a0d); 
            border: 12px solid #3e2723; border-radius: 150px; 
            margin: 20px auto; box-shadow: 0 0 50px #000;
        }
        .player { position: absolute; width: 140px; padding: 10px; border-radius: 10px; background: rgba(0,0,0,0.3); }
        .p0 { bottom: 20px; left: 330px; border: 2px solid #f1c40f; } /* Вы */
        .p1 { left: 20px; top: 200px; }
        .p2 { top: 20px; left: 330px; }
        .p3 { right: 20px; top: 200px; }
        
        .active-turn { box-shadow: 0 0 20px #f1c40f; background: rgba(241, 196, 15, 0.2); }
        .card { display: inline-block; width: 35px; height: 55px; background: white; color: black; border-radius: 4px; margin: 2px; line-height: 55px; font-size: 12px; font-weight: bold; }
        .card.hidden { background: #2c3e50; color: #2c3e50; border: 1px solid #fff; }
        
        .status-label { font-size: 10px; text-transform: uppercase; color: #aaa; }
        .pot-area { position: absolute; top: 40%; left: 35%; width: 30%; font-size: 24px; color: #f1c40f; }
        .controls { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
        
        button { padding: 10px 15px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
        .btn-blind { background: #8e44ad; color: white; }
        .btn-light { background: #2ecc71; color: white; }
        .btn-fold { background: #e74c3c; color: white; }
        
        #log { width: 800px; height: 100px; background: #000; margin: 10px auto; overflow-y: auto; padding: 10px; text-align: left; font-size: 12px; }
    </style>
</head>
<body>

<h1>Сека: Битва за банк</h1>
<div id="info-header">Раздает: <span id="dealer-name">Вы</span> | <span id="game-status" style="color:red">Ожидание</span></div>

<div class="table">
    <div class="pot-area">БАНК: <span id="pot-val">0</span><br><small style="font-size:14px">Текущая ставка: <span id="current-bet">10</span></small></div>
    
    <div id="player-0" class="player p0"><div class="status-label">Вы</div><div class="cards"></div><div class="points"></div></div>
    <div id="player-1" class="player p1"><div class="status-label">Бот 1</div><div class="cards"></div></div>
    <div id="player-2" class="player p2"><div class="status-label">Бот 2</div><div class="cards"></div></div>
    <div id="player-3" class="player p3"><div class="status-label">Бот 3</div><div class="cards"></div></div>
</div>

<div class="controls" id="player-actions" style="display:none">
    <button class="btn-blind" id="btn-blind" onclick="action('blind')">Тёмная (10)</button>
    <button class="btn-light" id="btn-see" onclick="seeCards()">Посмотреть карты (Светлая)</button>
    <button class="btn-light" id="btn-light" onclick="action('light')" style="display:none">Поставить (20)</button>
    <button class="btn-fold" onclick="action('fold')">Пас</button>
    <button class="btn-light" onclick="action('showdown')">Вскрыться</button>
</div>

<button id="start-btn" onclick="newGame()" style="padding: 20px 40px; background: #f1c40f;">НАЧАТЬ НОВУЮ РАЗДАЧУ</button>

<div id="log"></div>

<script>
    let players = []; 
    let pot = 0;
    let currentBet = 10;
    let dealerIdx = 0;
    let activeIdx = 0;
    let isSvara = false;
    let lastBetterWasBlind = true;
    let playerIsBlind = true;

    function addLog(m) { const l = document.getElementById('log'); l.innerHTML = m + "<br>" + l.innerHTML; }

    function createDeck() {
        const s = ['♥','♦','♣','♠'], v = ['10','J','Q','K','A'];
        let d = [];
        s.forEach(suit => v.forEach(val => d.push({v:val, s:suit, p: val==='A'?11:10})));
        d.push({v:'JK', s:'★', p:11});
        return d.sort(() => Math.random() - 0.5);
    }

    function calc(hand) {
        let hasJ = hand.some(c => c.v === 'JK'), pure = hand.filter(c => c.v !== 'JK');
        let sP = {'♥':0,'♦':0,'♣':0,'♠':0,'★':0};
        pure.forEach(c => sP[c.s] += c.p);
        let maxS = Math.max(...Object.values(sP)) + (hasJ ? 11 : 0);
        let counts = {}; pure.forEach(c => counts[c.v] = (counts[c.v] || 0) + 1);
        let setP = 0;
        for (let v in counts) if (counts[v] === 3 || (counts[v] === 2 && hasJ)) setP = (v === 'A' ? 31 : 30);
        return Math.max(maxS, setP);
    }

    function newGame() {
        let deck = createDeck();
        players = [];
        for(let i=0; i<4; i++) {
            players.push({ id: i, cards: [deck.pop(), deck.pop(), deck.pop()], isFolded: false, isBlind: true });
        }
        
        if (!isSvara) pot = 40; // Начальный кон
        document.getElementById('pot-val').innerText = pot;
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('player-actions').style.display = 'flex';
        document.getElementById('game-status').innerText = "Идет игра";
        
        activeIdx = (dealerIdx + 1) % 4;
        currentBet = 10;
        lastBetterWasBlind = true;
        playerIsBlind = true;
        updateUI();
        addLog("Раздача! Ход игрока " + activeIdx + (isSvara ? " (СВАРА!)" : ""));
    }

    function updateUI() {
        document.getElementById('current-bet').innerText = currentBet;
        for(let i=0; i<4; i++) {
            const container = document.querySelector(`#player-${i} .cards`);
            container.innerHTML = '';
            const el = document.getElementById(`player-${i}`);
            el.className = `player p${i} ${i === activeIdx ? 'active-turn' : ''} ${players[i].isFolded ? 'folded' : ''}`;
            
            players[i].cards.forEach(c => {
                const cardDiv = document.createElement('div');
                cardDiv.className = (i === 0 && !playerIsBlind) || (players[i].show) ? 'card' : 'card hidden';
                if (!cardDiv.classList.contains('hidden')) {
                    cardDiv.innerText = c.v + c.s;
                    if (c.s === '♥' || c.s === '♦') cardDiv.style.color = 'red';
                }
                container.appendChild(cardDiv);
            });
        }
        // Обновляем кнопки для игрока
        document.getElementById('btn-blind').innerText = `Тёмная (${currentBet})`;
        document.getElementById('btn-light').innerText = `Поставить (${lastBetterWasBlind ? currentBet * 2 : currentBet})`;
        document.getElementById('btn-blind').style.display = playerIsBlind ? 'inline-block' : 'none';
        document.getElementById('btn-light').style.display = !playerIsBlind ? 'inline-block' : 'none';
        document.getElementById('btn-see').style.display = playerIsBlind ? 'inline-block' : 'none';
    }

    function seeCards() {
        playerIsBlind = false;
        addLog("Вы посмотрели карты! Теперь ваши ставки в 2 раза выше.");
        updateUI();
    }

    function action(type) {
        if (activeIdx !== 0) return; // Ждем бота (в этой демо версии боты ходят мгновенно)

        if (type === 'blind') {
            pot += currentBet;
            lastBetterWasBlind = true;
            addLog("Вы поставили Тёмную: " + currentBet);
        } else if (type === 'light') {
            let val = lastBetterWasBlind ? currentBet * 2 : currentBet;
            pot += val;
            currentBet = val;
            lastBetterWasBlind = false;
            addLog("Вы поставили в светлую: " + val);
        } else if (type === 'fold') {
            players[0].isFolded = true;
            addLog("Вы спасовали.");
        } else if (type === 'showdown') {
            finishGame();
            return;
        }

        nextTurn();
    }

    function nextTurn() {
        activeIdx = (activeIdx + 1) % 4;
        if (players[activeIdx].isFolded) { nextTurn(); return; }
        
        if (activeIdx !== 0) {
            setTimeout(botTurn, 1000);
        }
        updateUI();
    }

    function botTurn() {
        // Простая логика бота: 80% ставит, 20% пас
        if (Math.random() > 0.2) {
            let bVal = lastBetterWasBlind ? currentBet : currentBet;
            pot += bVal;
            addLog(`Бот ${activeIdx} поддержал ставку ${bVal}`);
        } else {
            players[activeIdx].isFolded = true;
            addLog(`Бот ${activeIdx} ПАС`);
        }
        nextTurn();
    }

    function finishGame() {
        let bestScore = -1;
        let winners = [];

        players.forEach((p, idx) => {
            if (!p.isFolded) {
                p.show = true;
                let score = calc(p.cards);
                if (score > bestScore) {
                    bestScore = score;
                    winners = [idx];
                } else if (score === bestScore) {
                    winners.push(idx);
                }
            }
        });

        updateUI();

        if (winners.length > 1) {
            isSvara = true;
            addLog(`<b style="color:orange">СВАРА! У игроков ${winners} по ${bestScore} очков. Банк ${pot} остается!</b>`);
        } else {
            let winIdx = winners[0];
            addLog(`<b style="color:yellow">Победил ${winIdx === 0 ? "ВЫ" : "Бот "+winIdx} (${bestScore} очков)! Забрал ${pot}</b>`);
            pot = 0;
            isSvara = false;
            dealerIdx = winIdx;
        }

        document.getElementById('start-btn').style.display = 'inline-block';
        document.getElementById('player-actions').style.display = 'none';
        document.getElementById('pot-val').innerText = pot;
    }
</script>
</body>
</html>
