<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CriptoCapital - Майнинг Litecoin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
    body { font-family: 'Orbitron', sans-serif; }
    .neon { text-shadow: 0 0 20px #00f0ff, 0 0 40px #00f0ff; }
    .gpu-card { transition: all 0.4s; }
    .gpu-card:hover { transform: scale(1.05); box-shadow: 0 0 40px #00f0ff; }
    .fan { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .mining-glow { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <!-- HEADER -->
  <header class="bg-black/90 backdrop-blur-xl border-b border-cyan-400/30 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-coins text-4xl text-cyan-400"></i>
        <h1 class="text-4xl font-bold neon">CRIPTOCAPITAL</h1>
      </div>
      
      <div class="flex items-center gap-6">
        <!-- Wallet status -->
        <div id="wallet-section" onclick="connectWallet()" 
             class="cursor-pointer bg-zinc-900 hover:bg-zinc-800 px-6 py-2 rounded-2xl flex items-center gap-3 border border-cyan-400/50">
          <i class="fa-solid fa-wallet"></i>
          <span id="wallet-text" class="font-medium">Подключить Litecoin Wallet</span>
        </div>

        <!-- Balance -->
        <div class="text-right">
          <p class="text-cyan-400 text-sm">Баланс LTC</p>
          <p id="balance" class="text-4xl font-bold text-cyan-400">12.458</p>
        </div>
      </div>
    </div>
  </header>

  <div class="flex max-w-7xl mx-auto">
    <!-- SIDEBAR -->
    <div class="w-72 bg-zinc-900/80 min-h-screen p-6 border-r border-cyan-400/20">
      <div class="flex items-center gap-3 mb-10">
        <div class="w-12 h-12 bg-gradient-to-br from-cyan-400 to-blue-500 rounded-2xl flex items-center justify-center text-3xl">₿</div>
        <div>
          <p class="text-2xl font-bold">CriptoCapital</p>
          <p class="text-xs text-cyan-400">Litecoin Mining Farm</p>
        </div>
      </div>

      <button onclick="buyGPU()" 
              class="w-full bg-gradient-to-r from-cyan-400 to-blue-500 hover:from-cyan-500 hover:to-blue-600 py-4 rounded-3xl font-bold text-lg mb-8 flex items-center justify-center gap-3">
        <i class="fa-solid fa-cart-shopping"></i>
        КУПИТЬ ВИДЕОКАРТУ
      </button>

      <div class="space-y-6">
        <div>
          <p class="text-xs text-zinc-500 mb-2">ТВОЙ КОШЕЛЁК</p>
          <div id="wallet-address" class="font-mono text-xs bg-black p-3 rounded-2xl break-all text-cyan-400">
            Не подключён
          </div>
        </div>

        <div>
          <p class="text-xs text-zinc-500 mb-2">РЕФЕРАЛЬНАЯ ССЫЛКА</p>
          <div id="referral-link" class="font-mono text-xs bg-black p-3 rounded-2xl break-all text-cyan-400 border border-dashed border-cyan-400/50">
            Подключи кошелёк для реферальной ссылки
          </div>
        </div>
      </div>
    </div>

    <!-- MAIN -->
    <main class="flex-1 p-8">
      <h2 class="text-5xl font-bold neon mb-8">МОЯ МАЙНИНГ-ФЕРМА LTC</h2>

      <!-- GPU GRID -->
      <div class="grid grid-cols-3 gap-6" id="gpu-grid"></div>
    </main>
  </div>

  <!-- BUY MODAL -->
  <div id="buy-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
    <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-md border border-cyan-400">
      <h3 class="text-3xl font-bold mb-6">Магазин видеокарт</h3>
      <div id="shop-items" class="space-y-4"></div>
      <button onclick="closeModal()" class="mt-8 w-full py-4 bg-zinc-800 hover:bg-zinc-700 rounded-3xl">Закрыть</button>
    </div>
  </div>

  <script>
    let balance = 12.458;
    let walletAddress = null;
    let totalHash = 376.3;
    const balanceEl = document.getElementById('balance');

    // Авто-майнинг (0.00087 LTC в секунду)
    setInterval(() => {
      balance += 0.00087;
      balanceEl.textContent = balance.toFixed(3);
    }, 1000);

    // Базовые карты
    let gpus = [
      { name: "RTX 4090", hash: "145.8", power: "92", price: 0 },
      { name: "RX 7900 XTX", hash: "132.1", power: "94", price: 0 }
    ];

    function renderGPUs() {
      const grid = document.getElementById('gpu-grid');
      grid.innerHTML = '';
      gpus.forEach(gpu => {
        const div = document.createElement('div');
        div.className = `gpu-card bg-zinc-900 border border-cyan-400/30 rounded-3xl p-6 mining-glow`;
        div.innerHTML = `
          <div class="flex justify-between">
            <div>
              <p class="text-2xl font-bold">${gpu.name}</p>
              <p class="text-cyan-400">${gpu.hash} MH/s</p>
            </div>
            <i class="fa-solid fa-fan text-6xl text-cyan-400 fan"></i>
          </div>
          <div class="mt-6 h-2 bg-zinc-800 rounded-full overflow-hidden">
            <div class="h-full bg-cyan-400 rounded-full" style="width: ${gpu.power}%"></div>
          </div>
        `;
        grid.appendChild(div);
      });
    }

    // Подключение кошелька
    function connectWallet() {
      if (walletAddress) return;
      
      walletAddress = "ltc1q" + Math.random().toString(36).substring(2, 18).toUpperCase() + "xyz";
      document.getElementById('wallet-text').innerHTML = `✅ \( {walletAddress.slice(0,8)}... \){walletAddress.slice(-6)}`;
      document.getElementById('wallet-address').textContent = walletAddress;
      
      // Генерация реферальной ссылки
      const refCode = walletAddress.slice(-8);
      document.getElementById('referral-link').innerHTML = 
        `https://criptocapital.com/ref/${refCode}<br><span class="text-[10px] text-zinc-500">Приглашай друзей и получай 10% от их майнинга</span>`;
      
      alert("✅ Litecoin Wallet успешно подключён!\nАдрес: " + walletAddress);
    }

    // Магазин видеокарт
    const shop = [
      { name: "RTX 5090 Ti", hash: "198.5", power: "98", price: 0.85 },
      { name: "RTX 4080 Super", hash: "112.4", power: "89", price: 0.45 },
      { name: "RX 8900 XTX", hash: "167.2", power: "95", price: 0.72 }
    ];

    function buyGPU() {
      if (!walletAddress) {
        alert("Сначала подключи Litecoin Wallet!");
        return;
      }
      const modal = document.getElementById('buy-modal');
      const container = document.getElementById('shop-items');
      container.innerHTML = '';
      
      shop.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = "flex justify-between items-center bg-zinc-800 p-5 rounded-2xl cursor-pointer hover:bg-zinc-700";
        div.innerHTML = `
          <div>
            <p class="font-bold">${item.name}</p>
            <p class="text-cyan-400">${item.hash} MH/s • ${item.power}%</p>
          </div>
          <div class="text-right">
            <p class="font-bold text-lg">${item.price} LTC</p>
            <button onclick="purchase(${i}); event.stopImmediatePropagation()" 
                    class="mt-2 bg-cyan-400 text-black px-6 py-1 rounded-xl text-sm font-bold">Купить</button>
          </div>
        `;
        container.appendChild(div);
      });
      
      modal.classList.remove('hidden');
    }

    function purchase(index) {
      const item = shop[index];
      if (balance < item.price) {
        alert("Недостаточно LTC!");
        return;
      }
      balance -= item.price;
      balanceEl.textContent = balance.toFixed(3);
      
      gpus.push({
        name: item.name,
        hash: item.hash,
        power: item.power,
        price: item.price
      });
      
      totalHash += parseFloat(item.hash);
      renderGPUs();
      closeModal();
      alert(`🎉 Куплена \( {item.name}!\nХэшрейт + \){item.hash} MH/s`);
    }

    function closeModal() {
      document.getElementById('buy-modal').classList.add('hidden');
    }

    // Инициализация
    renderGPUs();
    
    // Стартовое приветствие
    setTimeout(() => {
      alert("Добро пожаловать в CriptoCapital!\nПодключи Litecoin Wallet и начинай майнить 🚀");
    }, 600);
  </script>
</body>
</html>
