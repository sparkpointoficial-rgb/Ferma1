<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spark's Mining Empire</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
    
    body { font-family: 'Orbitron', sans-serif; }
    .neon-text { text-shadow: 0 0 20px #00ff9d, 0 0 40px #00ff9d; }
    .gpu-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .gpu-card:hover { transform: scale(1.05) rotate(1deg); box-shadow: 0 0 40px #00ff9d; }
    .fan { animation: spin 1.2s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .mining-glow { animation: pulse 2s ease-in-out infinite; }
    .hash { animation: hashMove 1.5s linear infinite; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <!-- HEADER -->
  <header class="bg-black/80 backdrop-blur-xl border-b border-emerald-500/30 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-microchip text-3xl text-emerald-400"></i>
        <h1 class="text-3xl font-bold neon-text">SPARK MINING</h1>
      </div>
      <div class="flex items-center gap-8">
        <div class="text-right">
          <p class="text-emerald-400 text-sm">Баланс</p>
          <p id="balance" class="text-4xl font-bold text-emerald-400">12,458.73</p>
          <p class="text-xs text-zinc-500">MC (MinerCoin)</p>
        </div>
        <button onclick="claimReward()" class="bg-emerald-500 hover:bg-emerald-600 px-6 py-2 rounded-xl font-bold flex items-center gap-2">
          <i class="fa-solid fa-coins"></i> Забрать награду
        </button>
      </div>
    </div>
  </header>

  <div class="flex max-w-7xl mx-auto">
    <!-- SIDEBAR -->
    <div class="w-64 bg-zinc-900/80 min-h-screen p-6 border-r border-emerald-500/20">
      <div class="flex items-center gap-3 mb-8">
        <img src="https://i.imgur.com/8Z5Zf2K.png" class="w-12 h-12 rounded-2xl" alt="Avatar">
        <div>
          <p class="font-bold">Spark's Farm</p>
          <p class="text-xs text-emerald-400">Уровень 42</p>
        </div>
      </div>
      
      <nav class="space-y-2">
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl bg-emerald-500/10 text-emerald-400"><i class="fa-solid fa-house"></i> Ферма</a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-zinc-800"><i class="fa-solid fa-microchip"></i> Видеокарты</a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-zinc-800"><i class="fa-solid fa-users"></i> Рефералы</a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-zinc-800"><i class="fa-solid fa-chart-line"></i> Статистика</a>
      </nav>

      <div class="mt-12">
        <p class="text-xs text-zinc-500 mb-3">ТВОЯ ВИДЕОКАРТА</p>
        <div class="bg-zinc-900 p-4 rounded-3xl border border-emerald-500/30">
          <p class="font-bold text-lg">RTX 4090 Ti</p>
          <p class="text-emerald-400">145.8 MH/s</p>
          <div class="h-2 bg-zinc-800 rounded-full mt-3 overflow-hidden">
            <div class="h-full w-[92%] bg-gradient-to-r from-emerald-400 to-cyan-400 rounded-full"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- MAIN FARM -->
    <main class="flex-1 p-8">
      <h2 class="text-5xl font-bold mb-8 neon-text">ТВОЯ МАЙНИНГ-ФЕРМА</h2>

      <!-- GPU GRID -->
      <div class="grid grid-cols-3 gap-6" id="gpu-grid">
        <!-- JS добавит карты -->
      </div>

      <!-- REFERRALS -->
      <div class="mt-12 bg-zinc-900/70 border border-emerald-500/30 rounded-3xl p-8">
        <h3 class="text-2xl font-bold mb-6 flex items-center gap-3">
          <i class="fa-solid fa-users text-3xl text-purple-400"></i> Рефералы
        </h3>
        <div class="grid grid-cols-3 gap-6">
          <div class="bg-black/60 rounded-2xl p-6 text-center">
            <p class="text-4xl font-bold text-purple-400">87</p>
            <p class="text-zinc-400">1 уровень</p>
          </div>
          <div class="bg-black/60 rounded-2xl p-6 text-center">
            <p class="text-4xl font-bold text-purple-400">34</p>
            <p class="text-zinc-400">2 уровень</p>
          </div>
          <div class="bg-black/60 rounded-2xl p-6 text-center">
            <p class="text-4xl font-bold text-purple-400">12</p>
            <p class="text-zinc-400">3 уровень</p>
          </div>
        </div>
        <div class="mt-6 text-center">
          <p class="text-emerald-400 text-sm">Твоя реферальная ссылка:</p>
          <div class="bg-zinc-950 border border-dashed border-emerald-500 p-3 rounded-2xl mt-2 font-mono text-xs break-all">
            https://sparkmining.com/ref/spark12345
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Текущий баланс
    let balance = 12458.73;
    const balanceEl = document.getElementById('balance');

    // Обновление баланса каждую секунду
    setInterval(() => {
      balance += 0.87; // 0.87 MC в секунду (как будто майнишь)
      balanceEl.textContent = balance.toFixed(2);
    }, 1000);

    // Создаём анимированные видеокарты
    const gpus = [
      { name: "RTX 4090", hash: "145.8", power: "92" },
      { name: "RTX 4080", hash: "98.4", power: "87" },
      { name: "RX 7900 XTX", hash: "132.1", power: "94" }
    ];

    const grid = document.getElementById('gpu-grid');
    gpus.forEach((gpu, i) => {
      const card = document.createElement('div');
      card.className = `gpu-card bg-zinc-900 border border-emerald-500/30 rounded-3xl p-6 mining-glow`;
      card.innerHTML = `
        <div class="flex justify-between items-start">
          <div>
            <p class="text-2xl font-bold">${gpu.name}</p>
            <p class="text-emerald-400 text-xl">${gpu.hash} MH/s</p>
          </div>
          <div class="text-right">
            <i class="fa-solid fa-fan text-5xl text-cyan-400 fan"></i>
          </div>
        </div>
        <div class="mt-8 flex items-center gap-3">
          <div class="flex-1 h-3 bg-zinc-800 rounded-full overflow-hidden">
            <div class="h-full bg-gradient-to-r from-cyan-400 to-emerald-400 rounded-full" style="width: ${gpu.power}%"></div>
          </div>
          <span class="text-xs text-zinc-400">${gpu.power}%</span>
        </div>
        <div class="mt-4 text-center text-[10px] tracking-[4px] text-emerald-400 font-mono hash">MINING • LIVE • HASHING • LIVE</div>
      `;
      grid.appendChild(card);
    });

    // Кнопка "Забрать награду"
    function claimReward() {
      const reward = Math.floor(Math.random() * 450) + 120;
      balance += reward;
      balanceEl.textContent = balance.toFixed(2);
      
      const notif = document.createElement('div');
      notif.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#10b981;color:white;padding:16px 24px;border-radius:9999px;box-shadow:0 0 30px #10b981;font-weight:bold;';
      notif.innerHTML = `+${reward} MC получено! 🚀`;
      document.body.appendChild(notif);
      setTimeout(() => notif.remove(), 3000);
    }

    // Стартовое уведомление
    setTimeout(() => {
      alert("Добро пожаловать в Spark's Mining Empire! Баланс растёт автоматически 😉");
    }, 800);
  </script>
</body>
</html>
