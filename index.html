<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seka Pro - 33 Points</title>
    <style>
        :root { --gold: #f1c40f; --green: #2ecc71; --dark: #0a2e1a; }
        body { font-family: 'Arial', sans-serif; background: #000; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* Исправленная инфо-панель сверху */
        .game-header { width: 100%; background: rgba(0,0,0,0.8); padding: 10px; text-align: center; border-bottom: 2px solid var(--gold); z-index: 100; font-size: 14px; }
        #game-log { color: #ccc; height: 40px; overflow-y: hidden; }

        /* Стол */
        .table { 
            position: relative; width: 95vw; max-width: 800px; height: 450px; 
            background: radial-gradient(#1a5e35, #051a0d); 
            border: 10px solid #3e2723; border-radius: 150px; 
            margin: 20px auto; box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .player { position: absolute; width: 120px; text-align: center; transition: 0.3s; }
        .p0 { bottom: 10px; left: 50%; transform: translateX(-50%); } /* ВЫ */
        .p1 { left: 10px; top: 50%; transform: translateY(-50%); }
        .p2 { top: 10px; left: 50%; transform: translateX(-50%); }
        .p3 { right: 10px; top: 50%; transform: translateY(-50%); }

        .active-glow { box-shadow: 0 0 20px var(--gold); border-radius: 15px; background: rgba(255,255,255,0.1); }
        .folded { opacity: 0.3; filter: grayscale(1); }

        .card-row { display: flex; justify-content: center; gap: 4px; margin: 5px 0; }
        .card { 
            width: 35px; height: 55px; background: white; color: #000; border-radius: 4px; 
            font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center;
            box-shadow: 1px 1px 3px #000;
        }
        .card.hidden { background: linear-gradient(45deg, #2c3e50, #000); border: 1px solid #fff; color: transparent; }
        .card.joker { background: var(--gold); color: #000; }

        .chips { color: var(--gold); font-weight: bold; font-size: 16px; display: block; }
        .score-tag { font-size: 12px; color: #fff; background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 4px; visibility: hidden; }

        .pot-area { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        #pot-sum { font-size: 32px; color: var(--gold); margin: 0; }

        /* Панель управления (Удобная) */
        .controls { width: 100%; max-width: 600px; padding: 15px; background: #1a1a1a; border-radius: 15px 15px 0 0; display: flex; flex-direction: column; gap: 10px; }
        .btn-group { display: flex; justify-content: space-around; gap: 8px; }
        
        button { flex: 1; padding: 12px 5px; border: none; border-radius: 8px; font-weight: bold; font-size: 13px; text-transform: uppercase; cursor: pointer; }
        .btn-see { background: #3498db; color: white; }
        .btn-call { background: var(--green); color: white; }
        .btn-raise { background: #9b59b6; color: white; }
        .btn-fold { background: #e74c3c; color: white; }
        .btn-start { background: var(--gold); width: 100%; font-size: 18px; margin-bottom: 10px; }
        button:disabled { opacity: 0.4; }

        .slider-box { display: flex; align-items: center; gap: 10px; color: var(--gold); font-size: 14px; }
        input[type=range] { flex: 1; accent-color: var(--gold); }
    </style>
</head>
<body>

<div class="game-header">
    <div id="game-log">Нажми "Новая раздача", чтобы начать!</div>
</div>

<div class="table">
    <div class="pot-area">
        <h2 id="pot-sum">💰 0</h2>
        <div style="font-size:14px">Ставка: <span id="cur-bet-val">10</span></div>
    </div>

    <div id="player-1" class="player p1">
        <div class="score-tag"></div>
        <div class="card-row"></div>
        <span class="chips">1000</span><br><small>Бот 1</small>
    </div>
    <div id="player-2" class="player p2">
        <div class="score-tag"></div>
        <div class="card-row"></div>
        <span class="chips">1000</span><br><small>Бот 2</small>
    </div>
    <div id="player-3" class="player p3">
        <div class="score-tag"></div>
        <div class="card-row"></div>
        <span class="chips">1000</span><br><small>Бот 3</small>
    </div>

    <div id="player-0" class="player p0">
        <div class="score-tag" style="visibility:visible" id="my-score-display">В тёмную</div>
        <div class="card-row" id="my-cards"></div>
        <span class="chips" id="my-chips">1000</span><br><b>ВЫ</b>
    </div>
</div>

<div class="controls">
    <button id="start-btn" class="btn-start" onclick="newGame()">НОВАЯ РАЗДАЧА</button>
    
    <div id="ui-actions" style="display:none; flex-direction: column; gap: 10px;">
        <div class="slider-box">
            <span>Поднять на:</span>
            <input type="range" id="bet-slider" min="10" max="100" step="10" value="20" oninput="updateRaiseText(this.value)">
            <b id="raise-label">20</b>
        </div>
        <div class="btn-group">
            <button class="btn-see" id="see-btn" onclick="handleAction('see')">Глаза</button>
            <button class="btn-call" id="call-btn" onclick="handleAction('call')">Поддержать</button>
            <button class="btn-raise" onclick="handleAction('raise')">Повысить</button>
            <button class="btn-fold" onclick="handleAction('fold')">Пас</button>
            <button class="btn-see" style="background:#555" onclick="finishGame()">Вскрыть</button>
        </div>
    </div>
</div>

<script>
    let players = [];
    let pot = 0, currentBet = 10, activeIdx = 0, lastBetterBlind = true;

    function log(m) { document.getElementById('game-log').innerText = m; }
    function updateRaiseText(v) { document.getElementById('raise-label').innerText = v; }

    function calcPoints(hand) {
        let hasJ = hand.some(c => c.v === 'JK'), pure = hand.filter(c => c.v !== 'JK'), aces = pure.filter(c => c.v === 'A').length;
        if (aces === 3 || (aces === 2 && hasJ)) return 33;
        if (aces === 2 || (aces === 1 && hasJ)) return 22;
        let sP = {'♥':0,'♦':0,'♣':0,'♠':0,'★':0};
        pure.forEach(c => sP[c.s] += c.p);
        let maxS = Math.max(...Object.values(sP)) + (hasJ ? 11 : 0);
        let counts = {}; pure.forEach(c => counts[c.v] = (counts[c.v] || 0) + 1);
        let setP = 0; for (let v in counts) if (counts[v] === 3 || (counts[v] === 2 && hasJ)) setP = 30;
        return Math.max(maxS, setP);
    }

    function newGame() {
        const s = [{s:'♥',c:'red'},{s:'♦',c:'red'},{s:'♣',c:'black'},{s:'♠',c:'black'}], v = ['10','J','Q','K','A'];
        let deck = [];
        s.forEach(suit => v.forEach(val => deck.push({v:val, s:suit.s, c:suit.c, p: val==='A'?11:10})));
        deck.push({v:'JK', s:'★', c:'black', p:11, isJoker:true});
        deck.sort(() => Math.random() - 0.5);

        players = [0,1,2,3].map(i => ({
            id: i, chips: players[i]?.chips || 1000, hand: [deck.pop(), deck.pop(), deck.pop()], 
            isFolded: false, isBlind: true, show: false
        }));

        players.forEach(p => p.chips -= 10);
        pot = 40; currentBet = 10; activeIdx = 0; lastBetterBlind = true;
        
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('ui-actions').style.display = 'flex';
        log("Игра началась! Вы ходите в тёмную (Ставка 10).");
        updateUI();
    }

    function handleAction(type) {
        if (activeIdx !== 0) return;
        if (type === 'see') {
            players[0].isBlind = false;
            log("Вы посмотрели карты! Теперь ваши ставки X2.");
        } else if (type === 'call') {
            let cost = players[0].isBlind ? currentBet : currentBet * 2;
            players[0].chips -= cost; pot += cost;
            lastBetterBlind = players[0].isBlind;
            nextTurn();
        } else if (type === 'raise') {
            let r = parseInt(document.getElementById('bet-slider').value);
            currentBet = r;
            let cost = players[0].isBlind ? currentBet : currentBet * 2;
            players[0].chips -= cost; pot += cost;
            lastBetterBlind = players[0].isBlind;
            log("Вы подняли ставку до " + r);
            nextTurn();
        } else if (type === 'fold') { players[0].isFolded = true; finishGame(); }
        updateUI();
    }

    function nextTurn() {
        activeIdx = (activeIdx + 1) % 4;
        if (players[activeIdx].isFolded) { nextTurn(); return; }
        updateUI();
        if (activeIdx !== 0) setTimeout(botTurn, 1000);
    }

    function botTurn() {
        let b = players[activeIdx];
        if (Math.random() > 0.15) {
            let cost = lastBetterBlind ? currentBet : currentBet; // Боты темнят
            b.chips -= cost; pot += cost;
            log("Бот " + activeIdx + " поставил " + cost);
            nextTurn();
        } else {
            b.isFolded = true; log("Бот " + activeIdx + " спасовал.");
            nextTurn();
        }
    }

    function updateUI() {
        document.getElementById('pot-sum').innerText = "💰 " + pot;
        document.getElementById('cur-bet-val').innerText = currentBet;
        
        players.forEach((p, i) => {
            const el = document.getElementById(`player-${i}`);
            el.className = `player p${i} ${i === activeIdx ? 'active-glow' : ''} ${p.isFolded ? 'folded' : ''}`;
            el.querySelector('.chips').innerText = p.chips;
            
            const cardRow = el.querySelector('.card-row');
            cardRow.innerHTML = '';
            p.hand.forEach(card => {
                const d = document.createElement('div');
                let visible = (i === 0 && !p.isBlind) || p.show;
                d.className = visible ? `card` : 'card hidden';
                if (card.isJoker) d.classList.add('joker');
                if (visible) {
                    d.innerText = card.v + (card.isJoker ? '' : card.s);
                    d.style.color = card.c;
                }
                cardRow.appendChild(d);
            });

            // Показываем очки у ботов только если раунд окончен (p.show)
            if (p.show && !p.isFolded) {
                let tag = el.querySelector('.score-tag');
                tag.style.visibility = 'visible';
                tag.innerText = calcPoints(p.hand) + " очков";
            }
        });

        document.getElementById('see-btn').disabled = !players[0].isBlind;
        let callCost = players[0].isBlind ? currentBet : currentBet * 2;
        document.getElementById('call-btn').innerText = `Поддержать (${callCost})`;
        document.getElementById('my-score-display').innerText = players[0].isBlind ? "ТЁМНАЯ" : calcPoints(players[0].hand) + " очков";
    }

    function finishGame() {
        let best = -1, winners = [];
        players.forEach((p, i) => {
            p.show = true;
            if (!p.isFolded) {
                let pts = calcPoints(p.hand);
                if (pts > best) { best = pts; winners = [i]; }
                else if (pts === best) winners.push(i);
            }
        });

        updateUI();
        if (winners.length > 1) log("СВАРА! Банк остается.");
        else {
            let w = winners[0];
            players[w].chips += pot;
            log(`Победил ${w === 0 ? "ВЫ" : "Бот " + w} (${best} очков)!`);
            pot = 0;
        }
        document.getElementById('start-btn').style.display = 'block';
        document.getElementById('ui-actions').style.display = 'none';
    }
</script>
</body>
</html>
