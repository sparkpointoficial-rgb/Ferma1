<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seka Crypto Game - Test Mode</title>
    <style>
        body { font-family: sans-serif; background: #1a472a; color: white; text-align: center; }
        .table { border: 2px solid #555; border-radius: 50px; width: 80%; margin: 20px auto; padding: 20px; min-height: 400px; position: relative; }
        .player-hand { margin-top: 50px; }
        .card { display: inline-block; width: 60px; height: 90px; background: white; color: black; border-radius: 5px; margin: 5px; line-height: 90px; font-weight: bold; vertical-align: middle; border: 2px solid #000; }
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; cursor: pointer; background: #f1c40f; border: none; font-weight: bold; border-radius: 5px; }
        #log { background: rgba(0,0,0,0.5); width: 80%; margin: 20px auto; padding: 10px; height: 100px; overflow-y: auto; text-align: left; font-size: 14px; }
        .pot { font-size: 24px; color: #f1c40f; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>Сека (Тестовый режим)</h1>
    <p>Колода: 21 карта (10-A + Джокер)</p>

    <div class="pot">Банк: <span id="pot-value">0</span> очков</div>

    <div class="table">
        <div id="opponents"></div>
        <div class="player-hand">
            <h3>Ваши карты:</h3>
            <div id="my-cards"></div>
            <div id="my-points" style="color: #f1c40f;">Очки: 0</div>
        </div>
    </div>

    <div class="controls">
        <button onclick="startGame()">Новая раздача</button>
        <button onclick="placeBet()">Ставка (+10)</button>
        <button onclick="showdown()">Вскрыться</button>
    </div>

    <div id="log"></div>

    <script>
        const suits = ['♥', '♦', '♣', '♠'];
        const values = ['10', 'J', 'Q', 'K', 'A'];
        let deck = [];
        let playerHand = [];
        let pot = 0;

        function createDeck() {
            let d = [];
            suits.forEach(s => {
                values.forEach(v => {
                    let p = (v === 'A') ? 11 : 10;
                    d.push({ v, s, p });
                });
            });
            d.push({ v: 'JK', s: '★', p: 11 }); // Джокер
            return d;
        }

        function shuffle(d) {
            for (let i = d.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [d[i], d[j]] = [d[j], d[i]];
            }
            return d;
        }

        function calculatePoints(hand) {
            let hasJoker = hand.some(c => c.v === 'JK');
            let pure = hand.filter(c => c.v !== 'JK');
            
            // 1. По мастям
            let sPoints = { '♥':0, '♦':0, '♣':0, '♠':0, '★':0 };
            pure.forEach(c => sPoints[c.s] += c.p);
            let maxS = Math.max(...Object.values(sPoints));
            if (hasJoker) maxS += 11;

            // 2. Тройки (три одинаковых)
            let counts = {};
            pure.forEach(c => counts[c.v] = (counts[c.v] || 0) + 1);
            let setPoints = 0;
            for (let v in counts) {
                if (counts[v] === 3) setPoints = (v === 'A' ? 31 : 30);
                if (counts[v] === 2 && hasJoker) setPoints = (v === 'A' ? 31 : 30);
            }
            
            // 3. Три туза или три джокера (особые правила секи)
            if (hasJoker && pure.every(c => c.v === 'A' && pure.length === 2)) setPoints = 31;

            return Math.max(maxS, setPoints);
        }

        function startGame() {
            deck = shuffle(createDeck());
            playerHand = [deck.pop(), deck.pop(), deck.pop()];
            pot = 10;
            document.getElementById('pot-value').innerText = pot;
            displayCards();
            log("Раздача произведена. Кон по 10 очков.");
        }

        function displayCards() {
            const container = document.getElementById('my-cards');
            container.innerHTML = '';
            playerHand.forEach(c => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `${c.v}${c.s}`;
                if (c.s === '♥' || c.s === '♦') div.style.color = 'red';
                container.appendChild(div);
            });
            document.getElementById('my-points').innerText = "Очки: " + calculatePoints(playerHand);
        }

        function placeBet() {
            pot += 10;
            document.getElementById('pot-value').innerText = pot;
            log("Вы добавили 10. В банке: " + pot);
        }

        function showdown() {
            let points = calculatePoints(playerHand);
            // Симуляция оппонента (простой рандом для теста)
            let oppPoints = Math.floor(Math.random() * 20) + 11; 
            log(`Вскрытие! У вас: ${points}. У оппонента: ${oppPoints}.`);
            if (points >= oppPoints) {
                log("ВЫ ВЫИГРАЛИ " + pot + "!");
            } else {
                log("Вы проиграли.");
            }
        }

        function log(msg) {
            const l = document.getElementById('log');
            l.innerHTML += msg + "<br>";
            l.scrollTop = l.scrollHeight;
        }
    </script>
</body>
</html>
