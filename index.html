<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Seka Ultimate: 33 Points & Pro Betting</title>
    <style>
        :root { --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --dark: #0a2e1a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* Стол */
        .table { 
            position: relative; width: 850px; height: 500px; 
            background: radial-gradient(#1a5e35, #071a0d); 
            border: 15px solid #3e2723; border-radius: 200px; 
            margin: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .player { position: absolute; width: 140px; text-align: center; padding: 10px; border-radius: 15px; background: rgba(0,0,0,0.3); border: 2px solid transparent; transition: 0.3s; }
        .p0 { bottom: 20px; left: 355px; border-color: var(--gold); background: rgba(241,196,15,0.1); } /* Игрок */
        .p1 { left: 30px; top: 200px; }
        .p2 { top: 20px; left: 355px; }
        .p3 { right: 30px; top: 200px; }
        
        .active-turn { border-color: var(--green); box-shadow: 0 0 20px var(--green); }
        .folded { opacity: 0.3; filter: grayscale(1); }

        /* Карты */
        .card { 
            display: inline-block; width: 42px; height: 60px; 
            background: white; color: black; border-radius: 5px; 
            margin: 2px; line-height: 60px; font-weight: bold; 
            font-size: 16px; border: 1px solid #000; box-shadow: 2px 2px 5px #000;
        }
        .card.hidden { background: linear-gradient(45deg, #2c3e50, #000); color: transparent; border: 1px solid #fff; }

        /* Центр стола */
        .pot-info { position: absolute; top: 40%; left: 30%; width: 40%; text-align: center; }
        #pot-val { font-size: 36px; color: var(--gold); font-weight: bold; }
        .chips { color: var(--gold); font-size: 18px; font-weight: bold; display: block; }

        /* Панель управления */
        .controls { 
            background: #111; width: 100%; padding: 20px; 
            display: flex; justify-content: center; gap: 15px; 
            border-top: 4px solid #333; position: fixed; bottom: 0;
        }
        .bet-slider-cont { display: flex; flex-direction: column; align-items: center; gap: 5px; color: var(--gold); }
        
        button { padding: 12px 25px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-green { background: var(--green); color: white; }
        .btn-blue { background: #3498db; color: white; }
        .btn-red { background: var(--red); color: white; }
        .btn-start { background: var(--gold); font-size: 20px; }

        #log { width: 300px; height: 150px; background: rgba(0,0,0,0.8); position: fixed; right: 10px; bottom: 100px; overflow-y: auto; padding: 10px; font-size: 12px; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="table">
    <div class="pot-info">
        <div id="pot-val">💰 0</div>
        <div>Текущая ставка: <span id="cur-bet-display">10</span></div>
    </div>

    <div id="player-0" class="player p0"><b>ВЫ</b><div class="cards"></div><span class="chips" id="chips-0">1000</span><div id="score-0"></div></div>
    <div id="player-1" class="player p1">Бот 1<div class="cards"></div><span class="chips" id="chips-1">1000</span></div>
    <div id="player-2" class="player p2">Бот 2<div class="cards"></div><span class="chips" id="chips-2">1000</span></div>
    <div id="player-3" class="player p3">Бот 3<div class="cards"></div><span class="chips" id="chips-3">1000</span></div>
</div>

<div id="log"></div>

<div class="controls">
    <button id="start-btn" class="btn-start" onclick="startRound()">НОВАЯ РАЗДАЧА</button>
    
    <div id="game-btns" style="display:none; gap: 15px; align-items: center;">
        <button class="btn-blue" id="btn-see" onclick="seeCards()">Посмотреть</button>
        <button class="btn-green" id="btn-call" onclick="makeAction('call')">Поддержать</button>
        
        <div class="bet-slider-cont">
            <span>Поднять: <b id="raise-val">20</b></span>
            <input type="range" id="bet-range" min="10" max="200" step="10" oninput="updateRaiseVal(this.value)">
            <button class="btn-blue" onclick="makeAction('raise')">РАЙЗ (УВЕЛИЧИТЬ)</button>
        </div>

        <button class="btn-red" onclick="makeAction('fold')">Пас</button>
        <button class="btn-green" style="background: #9b59b6" onclick="finishGame()">Вскрыться</button>
    </div>
</div>

<script>
    let players = [
        {id: 0, chips: 1000, hand: [], isFolded: false, isBlind: true, show: false},
        {id: 1, chips: 1000, hand: [], isFolded: false, isBlind: true, show: false},
        {id: 2, chips: 1000, hand: [], isFolded: false, isBlind: true, show: false},
        {id: 3, chips: 1000, hand: [], isFolded: false, isBlind: true, show: false}
    ];
    let pot = 0, currentBet = 10, activeIdx = 0, lastBetterWasBlind = true;

    function addLog(m) { const l = document.getElementById('log'); l.innerHTML = `> ${m}<br>${l.innerHTML}`; }
    function updateRaiseVal(v) { document.getElementById('raise-val').innerText = v; }

    function calculateSeka(hand) {
        let hasJ = hand.some(c => c.v === 'JK');
        let pure = hand.filter(c => c.v !== 'JK');
        let aces = pure.filter(c => c.v === 'A').length;

        // ПРАВИЛО 33 и 22
        if (aces === 3 || (aces === 2 && hasJ)) return 33;
        if (aces === 2 || (aces === 1 && hasJ)) return 22;

        // Масти
        let sP = {'♥':0,'♦':0,'♣':0,'♠':0,'★':0};
        pure.forEach(c => sP[c.s] += c.p);
        let maxS = Math.max(...Object.values(sP)) + (hasJ ? 11 : 0);

        // Тройки
        let counts = {}; pure.forEach(c => counts[c.v] = (counts[c.v] || 0) + 1);
        let setP = 0;
        for (let v in counts) if (counts[v] === 3 || (counts[v] === 2 && hasJ)) setP = 30;

        return Math.max(maxS, setP);
    }

    function startRound() {
        let deck = [];
        const s = ['♥','♦','♣','♠'], v = ['10','J','Q','K','A'];
        s.forEach(suit => v.forEach(val => deck.push({v:val, s:suit, p: val==='A'?11:10})));
        deck.push({v:'JK', s:'★', p:11});
        deck.sort(() => Math.random() - 0.5);

        players.forEach(p => {
            p.hand = [deck.pop(), deck.pop(), deck.pop()];
            p.isFolded = false; p.isBlind = true; p.show = false;
            p.chips -= 10; pot += 10;
        });

        currentBet = 10; activeIdx = 0; lastBetterWasBlind = true;
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('game-btns').style.display = 'flex';
        addLog("Раздача! Все поставили по 10. Ваш ход.");
        updateUI();
    }

    function seeCards() {
        players[0].isBlind = false;
        addLog("Вы посмотрели карты (Ставки x2)");
        updateUI();
    }

    function makeAction(type) {
        if (activeIdx !== 0) return;
        let cost = 0;

        if (type === 'call') {
            cost = (players[0].isBlind) ? currentBet : currentBet * 2;
            lastBetterWasBlind = players[0].isBlind;
        } else if (type === 'raise') {
            let raiseAmt = parseInt(document.getElementById('bet-range').value);
            currentBet = raiseAmt;
            cost = (players[0].isBlind) ? currentBet : currentBet * 2;
            lastBetterWasBlind = players[0].isBlind;
            addLog(`Вы подняли ставку до ${currentBet}`);
        } else if (type === 'fold') {
            players[0].isFolded = true;
            finishGame(); return;
        }

        players[0].chips -= cost; pot += cost;
        nextTurn();
    }

    function nextTurn() {
        activeIdx = (activeIdx + 1) % 4;
        if (players[activeIdx].isFolded) { nextTurn(); return; }
        updateUI();
        if (activeIdx !== 0) setTimeout(botTurn, 1000);
    }

    function botTurn() {
        let b = players[activeIdx];
        if (Math.random() > 0.15) {
            let cost = lastBetterWasBlind ? currentBet : currentBet; // Боты "темнят"
            b.chips -= cost; pot += cost;
            addLog(`Бот ${activeIdx} поставил ${cost}`);
        } else {
            b.isFolded = true;
            addLog(`Бот ${activeIdx} ПАС`);
        }
        nextTurn();
    }

    function updateUI() {
        document.getElementById('pot-val').innerText = "💰 " + pot;
        document.getElementById('cur-bet-display').innerText = currentBet;
        
        players.forEach((p, i) => {
            document.getElementById(`chips-${i}`).innerText = p.chips;
            const el = document.getElementById(`player-${i}`);
            el.className = `player p${i} ${i === activeIdx ? 'active-turn' : ''} ${p.isFolded ? 'folded' : ''}`;
            
            const cardCont = el.querySelector('.cards');
            cardCont.innerHTML = '';
            p.hand.forEach(c => {
                const d = document.createElement('div');
                d.className = (i === 0 && !p.isBlind) || p.show ? 'card' : 'card hidden';
                if (!d.classList.contains('hidden')) {
                    d.innerHTML = c.v + c.s;
                    if (c.s === '♥' || c.s === '♦') d.style.color = 'red';
                }
                cardCont.appendChild(d);
            });
        });

        document.getElementById('btn-see').disabled = !players[0].isBlind;
        let callCost = players[0].isBlind ? currentBet : currentBet * 2;
        document.getElementById('btn-call').innerText = `Поддержать (${callCost})`;
        
        if (!players[0].isBlind) {
            document.getElementById('score-0').innerText = "Очки: " + calculateSeka(players[0].hand);
        } else {
            document.getElementById('score-0').innerText = "В ТЁМНУЮ";
        }
    }

    function finishGame() {
        let winners = [], max = -1;
        players.forEach((p, i) => {
            p.show = true;
            if (!p.isFolded) {
                let pts = calculateSeka(p.hand);
                if (pts > max) { max = pts; winners = [i]; }
                else if (pts === max) { winners.push(i); }
            }
        });

        updateUI();
        if (winners.length > 1) {
            addLog(`<b style="color:orange">СВАРА! Банк ${pot} остается на месте!</b>`);
        } else {
            let wIdx = winners[0];
            players[wIdx].chips += pot;
            addLog(`<b style="color:var(--green)">Победил ${wIdx==0?'ВЫ':'Бот '+wIdx} (${max} очк.) Забрал ${pot}</b>`);
            pot = 0;
        }

        document.getElementById('start-btn').style.display = 'block';
        document.getElementById('game-btns').style.display = 'none';
    }
</script>
</body>
</html>
